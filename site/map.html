<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Map · Morgan Group Development Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,450;9..144,550;9..144,650&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="vendor/leaflet.css">
<link rel="stylesheet" href="style.css?v=11">
<link rel="icon" href="logo.svg">
</head>
<body>

<nav class="topbar">
  <a class="tb-brand" href="index.html" title="Back to overview">
    <span class="tb-logo"><img src="logo.svg" alt=""></span>
    <span class="tb-word">Morgan&nbsp;Group</span>
  </a>
  <span class="tb-div"></span>
  <span class="tb-context" id="brandSub">Florida Development Radar</span>
  <span class="tb-spacer"></span>
  <span class="tb-updated" id="updatedAt"></span>
  <button id="csvBtn" class="tb-btn" title="Export the currently filtered projects as CSV">⤓ Export CSV</button>
  <a class="tb-btn tb-btn-solid" href="index.html">Overview</a>
</nav>

<div class="content">
  <aside class="sidebar" id="panel">
    <section class="stats" id="stats">
      <div class="stat"><b id="statMapped">–</b><span>sites</span></div>
      <div class="stat stat-mf"><b id="statMF">–</b><span>multifamily</span></div>
      <div class="stat" title="Sites with a hearing still ahead on the calendar"><b id="statUpcoming">–</b><span>hearing ahead</span></div>
    </section>

    <section class="filters">
      <input type="search" id="search" placeholder="Search projects, addresses…" autocomplete="off">

      <div class="seg" id="seg" role="tablist" aria-label="Quick filter">
        <button data-seg="all" class="on">All</button>
        <button data-seg="mf" title="Only sites with a multifamily-relevant item">Multifamily</button>
        <button data-seg="upcoming" title="Only sites with a hearing still ahead on the calendar">Upcoming</button>
      </div>

      <div class="f-label">Counties</div>
      <div class="chips" id="countyChips" aria-label="County filters"></div>

      <details class="more" id="moreFilters">
        <summary>Filters</summary>
        <div class="f-label">Project categories</div>
        <div class="types" id="typeChecks" aria-label="Project category filters"></div>
        <label class="arch-line">
          <input type="checkbox" id="showArchived">
          Show archived sites <span id="archCount"></span>
        </label>
      </details>
    </section>

    <nav class="drawer-tabs">
      <button data-drawer="projects" id="projectsTab" title="All matching sites, best first">List</button>
      <button data-drawer="latest" id="latestTab" title="Sites first discovered by the nightly scan in the last 7 days">New <span id="latestCount"></span></button>
      <button data-drawer="saved" id="savedTab" title="Sites you saved with the heart button">♥ Saved <span id="savedCount"></span></button>
    </nav>
    <section class="drawer" id="drawer" hidden></section>
    <footer class="drawer-foot">
      <button data-drawer="hearings">Hearings <span id="hearingsCount"></span></button>
      <button data-drawer="unmapped">Unmapped <span id="unmappedCount"></span></button>
      <button data-drawer="coverage">Sources <span id="coverageCount"></span></button>
    </footer>
  </aside>

  <button class="panel-toggle" id="collapseBtn" title="Toggle panel" aria-label="Toggle panel">‹</button>
  <div id="map" aria-label="Development sites map"></div>

  <div class="legend" aria-label="Map key">
    <span><i style="background:#d4593c"></i>Rezoning &amp; Land Use</span>
    <span><i style="background:#3b6fb3"></i>Site Plans &amp; PUD</span>
    <span><i style="background:#8a8f96"></i>Variances &amp; Exceptions</span>
    <span><i style="background:#6d7278"></i>Other</span>
    <span class="lg-mf" title="Multifamily sites are drawn larger with a dark outline"><i class="lg-ring"></i>Multifamily</span>
  </div>

  <article class="prop-card" id="propCard" hidden>
    <button class="pc-close" id="pcClose" aria-label="Close">×</button>
    <div id="pcBody"></div>
  </article>
</div>

<script src="vendor/leaflet.js"></script>
<script src="app.js?v=11"></script>
</body>
</html>
