<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Morgan Group · Florida Development Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="vendor/leaflet.css">
<link rel="stylesheet" href="vendor/MarkerCluster.css">
<link rel="stylesheet" href="vendor/MarkerCluster.Default.css">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='42' fill='%23c9a227'/></svg>">
</head>
<body>
<div id="map" aria-label="Development projects map"></div>

<aside class="panel" id="panel">
  <header class="brand">
    <div class="brand-mark">MG</div>
    <div class="brand-text">
      <h1>Morgan&nbsp;Group</h1>
      <p>Florida Development Radar</p>
    </div>
    <button class="panel-collapse" id="collapseBtn" title="Collapse panel" aria-label="Collapse panel">‹</button>
  </header>

  <section class="stats" id="stats">
    <div class="stat"><b id="statMapped">–</b><span>on map</span></div>
    <div class="stat stat-mf"><b id="statMF">–</b><span>multifamily</span></div>
    <div class="stat"><b id="statUpcoming">–</b><span>upcoming</span></div>
    <div class="stat"><b id="statSources">–</b><span>sources</span></div>
  </section>

  <section class="filters">
    <input type="search" id="search" placeholder="Search projects, addresses…" autocomplete="off">

    <div class="filter-row">
      <label class="mf-toggle">
        <input type="checkbox" id="mfOnly">
        <span class="mf-slider"></span>
        Multifamily only
      </label>
      <label class="mf-toggle new-toggle">
        <input type="checkbox" id="newOnly">
        <span class="mf-slider"></span>
        New
      </label>
      <select id="statusSel" aria-label="Hearing status">
        <option value="all">All hearings</option>
        <option value="upcoming">Upcoming</option>
        <option value="heard">Recently heard</option>
      </select>
    </div>

    <div class="chips" id="countyChips" aria-label="County filters"></div>
    <div class="types" id="typeChecks" aria-label="Project type filters"></div>
  </section>

  <nav class="drawer-tabs">
    <button data-drawer="hearings" id="hearingsTab">Hearings <span id="hearingsCount"></span></button>
    <button data-drawer="unmapped" id="unmappedTab">Unmapped <span id="unmappedCount"></span></button>
    <button data-drawer="coverage" id="coverageTab">Coverage <span id="coverageCount"></span></button>
  </nav>
  <section class="drawer" id="drawer" hidden></section>

  <footer class="panel-foot">
    <span id="updatedAt"></span>
    <button id="csvBtn" class="csv-btn" title="Export the currently filtered projects as CSV">⤓ CSV</button>
  </footer>
</aside>

<button class="panel-expand" id="expandBtn" hidden title="Show panel">›</button>

<script src="vendor/leaflet.js"></script>
<script src="vendor/leaflet.markercluster.js"></script>
<script src="app.js"></script>
</body>
</html>
